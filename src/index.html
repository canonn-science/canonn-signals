<!doctype html>
<html lang="en">

<head>

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-38TZZ8DXZF');

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* The app's global styles only load after bootstrap, so give the document a height
       here — otherwise the height:100% splash wrapper collapses and the centred logo

    html, body { height: 100%; margin: 0; }
  </style>

<body>
  <app-root>
    <div style="position: relative; height: 100%; width: 100%;">
      <div
        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <!-- Static splash logo. Reuses the app's asset, so the byte download is shared
             with CanonnLogoComponent via the HTTP cache. The home page animates it; the
             pre-bootstrap splash deliberately stays static. -->
        <img src="assets/canonn.svg" alt="" style="width: 100px; height: 100px;" />
        <noscript>
          <span style="color: #fff">
            Javascript is required to run this application.
          </span>
        </noscript>
      </div>
    </div>
  </app-root>
