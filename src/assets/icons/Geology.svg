<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b9b9c0"/>
      <stop offset="1" stop-color="#56565e"/>
    </linearGradient>
    <linearGradient id="lavaFlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd84d"/>
      <stop offset="0.5" stop-color="#ff7a18"/>
      <stop offset="1" stop-color="#e02500"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.5" stop-color="#ff8a1e"/>
      <stop offset="1" stop-color="#ff8a1e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- eruption glow -->
  <ellipse cx="32" cy="24" rx="16" ry="15" fill="url(#glow)" opacity="0.8"/>

  <!-- smoke / ash plume -->
  <g fill="#6b6258" opacity="0.5">
    <circle cx="30" cy="11" r="5"/>
    <circle cx="38" cy="9" r="4.2"/>
    <circle cx="34" cy="6" r="4"/>
    <circle cx="26" cy="8" r="3.8"/>
    <circle cx="41" cy="13" r="3.8"/>
  </g>

  <!-- erupting lava blobs -->
  <g fill="url(#lavaFlow)">
    <circle cx="32" cy="11" r="3"/>
    <circle cx="25" cy="15" r="2.3"/>
    <circle cx="39" cy="14" r="2.6"/>
    <circle cx="30" cy="7" r="2"/>
    <circle cx="37" cy="8" r="1.9"/>
    <circle cx="22" cy="19" r="1.7"/>
    <circle cx="43" cy="18" r="1.7"/>
    <circle cx="32" cy="18" r="2.1"/>
  </g>

  <!-- mountain body (smaller cone) -->
  <path d="M16 58 L27 38 Q28.5 35 31 35 L33 35 Q35.5 35 37 38 L48 58 Z" fill="url(#mountain)"/>
  <!-- shaded right slope -->
  <path d="M37 38 Q35.5 35 33 35 L32 35 L32 58 L48 58 Z" fill="#000" opacity="0.16"/>

  <!-- crater lava pool -->
  <ellipse cx="32" cy="35.5" rx="6" ry="2.4" fill="url(#lavaFlow)"/>

  <!-- lava dripping down the slopes -->
  <path d="M29 37 Q28.5 43 29.5 47 Q30 51 28.5 54 Q28 55.5 29 57 Q30.5 55 30 51.5 Q29.5 47 30.5 43 Q31 39 30.5 37 Z" fill="url(#lavaFlow)"/>
  <path d="M36 38 Q37 42 36 46 Q35 50 36.5 54 Q37 55.5 36 57 Q34.5 54.5 35.5 51 Q36.5 47 35.5 43 Q35 40 35.5 38 Z" fill="url(#lavaFlow)"/>

  <!-- lava droplets -->
  <circle cx="29" cy="58.5" r="1.5" fill="#e02500"/>
  <circle cx="36" cy="58.5" r="1.3" fill="#ff7a18"/>
  <circle cx="32.5" cy="50" r="1" fill="#ffd84d"/>
</svg>
