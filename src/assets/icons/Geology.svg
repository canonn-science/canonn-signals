<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b6b6f"/>
      <stop offset="1" stop-color="#2e2e31"/>
    </linearGradient>
    <linearGradient id="lavaFlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd84d"/>
      <stop offset="0.5" stop-color="#ff7a18"/>
      <stop offset="1" stop-color="#e02500"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.5" stop-color="#ff8a1e"/>
      <stop offset="1" stop-color="#ff8a1e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- eruption glow -->
  <ellipse cx="32" cy="20" rx="16" ry="14" fill="url(#glow)" opacity="0.8"/>

  <!-- smoke / ash plume -->
  <g fill="#6b6258" opacity="0.55">
    <circle cx="30" cy="10" r="6"/>
    <circle cx="38" cy="8" r="5"/>
    <circle cx="34" cy="5" r="4.5"/>
    <circle cx="26" cy="6" r="4"/>
    <circle cx="40" cy="13" r="4"/>
  </g>

  <!-- mountain body -->
  <path d="M8 58 L24 22 Q26 18 30 18 L34 18 Q38 18 40 22 L56 58 Z" fill="url(#mountain)"/>
  <!-- shaded right slope -->
  <path d="M40 22 Q38 18 34 18 L32 18 L32 58 L56 58 Z" fill="#000" opacity="0.18"/>

  <!-- crater lava pool -->
  <ellipse cx="32" cy="19" rx="9" ry="3.5" fill="url(#lavaFlow)"/>

  <!-- erupting lava blobs -->
  <g fill="url(#lavaFlow)">
    <circle cx="32" cy="9" r="3"/>
    <circle cx="26" cy="13" r="2.2"/>
    <circle cx="38" cy="12" r="2.5"/>
    <circle cx="30" cy="6" r="2"/>
    <circle cx="36" cy="7" r="1.8"/>
    <circle cx="22" cy="16" r="1.6"/>
    <circle cx="42" cy="16" r="1.6"/>
  </g>

  <!-- lava dripping down the slopes -->
  <path d="M28 20 Q27 30 29 38 Q30 44 27 50 Q26 53 28 56 Q31 53 30 48 Q29 40 31 32 Q32 25 31 20 Z" fill="url(#lavaFlow)"/>
  <path d="M37 21 Q39 28 37 34 Q35 40 38 47 Q39 51 37 55 Q34 50 36 44 Q38 37 36 30 Q35 25 36 21 Z" fill="url(#lavaFlow)"/>

  <!-- lava droplets -->
  <circle cx="28" cy="58" r="1.6" fill="#e02500"/>
  <circle cx="37" cy="57" r="1.4" fill="#ff7a18"/>
  <circle cx="33" cy="46" r="1.1" fill="#ffd84d"/>
</svg>
