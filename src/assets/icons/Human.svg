<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 64 64">
  <!-- "Humanity" icon: a Vitruvian-style figure inside a circle.
       Small head, broad shoulders tapering to a waist; four distinct arms
       (each shoulder sends one up-and-out, one down-and-out) and two legs
       spread to the lower rim. Hands & feet touch the circle. One warm tone. -->
  <defs>
    <!-- userSpaceOnUse: ONE radial field shared by every shape, so the whole
         icon reads as a single blended tone instead of per-part shading. -->
    <radialGradient id="humanity" gradientUnits="userSpaceOnUse"
                    cx="27" cy="23" r="46">
      <stop offset="0"    stop-color="#ffc070"/>
      <stop offset="0.55" stop-color="#f5822a"/>
      <stop offset="1"    stop-color="#d4590f"/>
    </radialGradient>
  </defs>

  <!-- enclosing circle -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#humanity)" stroke-width="2.6"/>

  <!-- limbs: four arms + two legs, hands & feet touching the rim -->
  <g fill="none" stroke="url(#humanity)" stroke-width="2.8" stroke-linecap="round">
    <!-- left arms: upper (raised) + lower (out, near level) -->
    <line x1="27" y1="22" x2="10"  y2="17"/>
    <line x1="27" y1="22" x2="6.9" y2="22"/>
    <!-- right arms -->
    <line x1="37" y1="22" x2="54"   y2="17"/>
    <line x1="37" y1="22" x2="57.1" y2="22"/>
    <!-- legs, spread to the lower rim -->
    <line x1="30" y1="39.5" x2="18" y2="55"/>
    <line x1="34" y1="39.5" x2="46" y2="55"/>
  </g>

  <!-- the body: small head + tapered torso (broad shoulders → narrow waist) -->
  <circle cx="32" cy="11.5" r="3.6" fill="url(#humanity)"/>
  <path d="M32 16
           C28.5 16 26.8 17.8 27 21
           C27.2 26 28.8 30 29 33.5
           C29.1 36 28.7 38 29.2 39.6
           C30.4 41.2 33.6 41.2 34.8 39.6
           C35.3 38 34.9 36 35 33.5
           C35.2 30 36.8 26 37 21
           C37.2 17.8 35.5 16 32 16 Z"
        fill="url(#humanity)"/>
</svg>
