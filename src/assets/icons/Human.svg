<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 64 64">
  <!-- "Humanity" icon: a Vitruvian-style figure inside a circle.
       Small head, broad shoulders tapering to a waist; four arms (each
       shoulder one raised, one level) and two legs spread to the rim.
       One warm radial-orange tone, with a thin dark outline so it stays
       visible on bright backgrounds. -->
  <defs>
    <radialGradient id="humanity" gradientUnits="userSpaceOnUse"
                    cx="27" cy="23" r="46">
      <stop offset="0"    stop-color="#e89a4f"/>
      <stop offset="0.55" stop-color="#d2702a"/>
      <stop offset="1"    stop-color="#b04e12"/>
    </radialGradient>
  </defs>

  <!-- DARK OUTLINE underlay: same shapes, slightly fatter, drawn first so a
       thin dark edge shows around everything. -->
  <g fill="#3a1607" stroke="#3a1607" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="32" cy="32" r="29" fill="none" stroke-width="4.6"/>
    <g fill="none" stroke-width="4.8">
      <line x1="27" y1="22" x2="10"  y2="17"/>
      <line x1="27" y1="22" x2="6.9" y2="22"/>
      <line x1="37" y1="22" x2="54"   y2="17"/>
      <line x1="37" y1="22" x2="57.1" y2="22"/>
      <line x1="30" y1="39.5" x2="18" y2="55"/>
      <line x1="34" y1="39.5" x2="46" y2="55"/>
    </g>
    <circle cx="32" cy="11.5" r="3.6" stroke-width="2.2"/>
    <path d="M32 16
             C28.5 16 26.8 17.8 27 21
             C27.2 26 28.8 30 29 33.5
             C29.1 36 28.7 38 29.2 39.6
             C30.4 41.2 33.6 41.2 34.8 39.6
             C35.3 38 34.9 36 35 33.5
             C35.2 30 36.8 26 37 21
             C37.2 17.8 35.5 16 32 16 Z" stroke-width="2.2"/>
  </g>

  <!-- ORANGE figure on top -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#humanity)" stroke-width="2.6"/>
  <g fill="none" stroke="url(#humanity)" stroke-width="2.8" stroke-linecap="round">
    <line x1="27" y1="22" x2="10"  y2="17"/>
    <line x1="27" y1="22" x2="6.9" y2="22"/>
    <line x1="37" y1="22" x2="54"   y2="17"/>
    <line x1="37" y1="22" x2="57.1" y2="22"/>
    <line x1="30" y1="39.5" x2="18" y2="55"/>
    <line x1="34" y1="39.5" x2="46" y2="55"/>
  </g>
  <circle cx="32" cy="11.5" r="3.6" fill="url(#humanity)"/>
  <path d="M32 16
           C28.5 16 26.8 17.8 27 21
           C27.2 26 28.8 30 29 33.5
           C29.1 36 28.7 38 29.2 39.6
           C30.4 41.2 33.6 41.2 34.8 39.6
           C35.3 38 34.9 36 35 33.5
           C35.2 30 36.8 26 37 21
           C37.2 17.8 35.5 16 32 16 Z"
        fill="url(#humanity)"/>
</svg>
